
[database]
db_host = 127.0.0.1
db_port = 5432
db_user = user_xxx
db_password = password_xxx
db_name = db_factor

[factor_corr]
; 是否启用因子相关性矩阵任务
enable = true

; 相关性计算窗口长度（天）
; 例如 252 表示最近约 1 年的交易日
window_days = 252

; 两个因子参与相关性计算所需的最小重叠有效天数
; 如果在窗口内共同有值的交易日数 < min_overlap_days，则不输出这对因子的相关系数
min_overlap_days = 120

; Redis key 前缀，最终 key = <prefix>:<yyyymmdd>
; 按约定默认使用 factor:corr，策略工厂会读取该前缀下的 key
redis_key_prefix = factor:corr

; 在 Redis 中保留多少天的历史 key，按 key 后缀 <yyyymmdd> 判断
; 例如 30 表示只保留最近 30 天的 factor:corr:*，更早的 key 会在任务中被删除
keep_days = 30

; 因子 CSV 输出目录（由 factor_engine_runner 生成）
; 需与 backtest_core/backtest_io 中的 factor_output_dir 保持一致
factor_output_dir = factor_values

; 可选：只对指定因子列表计算相关性（逗号分隔）
; 不配置或留空表示对所有 is_valid=true 的因子进行相关性计算
; factor_ids = JQ_ALPHA_001,JQ_ALPHA_002

; 可选：显式指定计算日期（YYYY-MM-DD）
; 若不配置或留空，则默认使用当前 UTC 日期
; as_of_date = 2026-03-17

[redis]
; Redis 连接配置，需与 docs/redis_conventions.md 一致
host = 127.0.0.1
port = 6379
db = 0
password =