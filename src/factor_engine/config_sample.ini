[database]
db_host = 127.0.0.1
db_port = 5432
db_user = postgres
db_password = your_password_here
db_name = qclaw_factor_engine

[factor_engine]
; 默认计算时间区间（测试环境建议与 data_ingest 保持一致）
start_date = 2024-01-01
end_date   = 2024-03-31

; 需要计算的因子ID列表（逗号分隔；留空表示“解析到的全部因子”）
factor_ids =

; 领域编码（默认全市场）：ALL / STOCK / HS300 / ZZ500 / CUSTOM / INDEX / CSI / ETF / LOF / FUTURES
universe = ALL
; 仅当 universe=CUSTOM 时生效（逗号分隔，内部代码，如 000001.SZ）
stock_codes =

skip_factor_ids = JQ_ALPHA_030

