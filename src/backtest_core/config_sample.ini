[database]
db_host = 127.0.0.1
db_port = 5432
db_user = postgres
db_password = your_password_here
db_name = qclaw_factor_engine

[backtest]
; 回测 horizon（单位：交易日）
horizon = 5

; 分层数量
n_quantiles = 10

; 因子 CSV 根目录（将扫描该目录下所有 *.csv），统一放在项目根的 factor_values 目录
factor_output_dir = factor_values

; 可选：仅回测这些因子ID（逗号分隔）；留空则对目录下所有 CSV 扫描
factor_ids =

; 大回测实证域（写入 factor_backtest.test_universe），默认全市场
test_universe = ALL

