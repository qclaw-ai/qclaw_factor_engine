; 日更因子值 runner 配置样例
; 复制为 config.ini / config_dev.ini 后修改数据库连接

[database]
db_host = localhost
db_port = 5432
db_user = postgres
db_password =
db_name = db_factor

; 日更行为
[daily]
; 向前拉取 stock_daily 的自然日长度（rolling/REF 需要历史窗口）
lookback_days = 380
; valid_only | all_in_basic（见 README）
scope = valid_only
