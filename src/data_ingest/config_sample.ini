[database]
db_host = 127.0.0.1
db_port = 5432
db_user = postgres
db_password = your_password_here
db_name = qclaw_factor_engine

[paths]
factor_docs_dir = ./factor_docs/md
backtest_results_dir = ./backtest_results
logs_dir = ./logs

[data_ingest]
; 导入模式：full = 全量导入（按 start_date/end_date）；daily = 日更（后续扩展）
mode = full

; 股票池类型：ALL_A / HS300 / ZZ500 / CUSTOM
universe = CUSTOM

; 仅当 universe = CUSTOM 时生效
stock_codes = 000001.SZ,600000.SH

start_date = 2024-01-01
end_date = 2024-03-31

; 前复权方式：qfq/hfq/None（具体含义见 AkShare 文档）
adjust = qfq

[jq]
user = your_jq_username
password = your_jq_password

[data_ingest_jq_initial]
; 历史导入：先从 2015-01-01 拉到今天，后面可以再改
start_date = 2015-01-01
end_date   = 2026-03-16

; 暂时先小范围测试，用几只票
universe = CUSTOM
stock_codes = 000001.SZ,600000.SH

; 一次 get_price 拉多少只股票，后面跑全 A 再调大
batch_size = 200

