[database]
db_host = 127.0.0.1
db_port = 5432
db_user = postgres
db_password = your_password_here
db_name = qclaw_factor_engine

[paths]
factor_docs_dir = ./factor_docs/md
backtest_results_dir = ./backtest_results
logs_dir = ./logs

[data_ingest]
; 导入模式：full = 全量导入（按 start_date/end_date）；daily = 日更（后续扩展）
mode = full

; 股票池类型：ALL_A / HS300 / ZZ500 / CUSTOM
universe = CUSTOM

; 仅当 universe = CUSTOM 时生效
stock_codes = 000001.SZ,600000.SH

start_date = 2024-01-01
end_date = 2024-03-31

; 前复权方式：qfq/hfq/None（具体含义见 AkShare 文档）
adjust = qfq

[jq]
user = your_jq_username
password = your_jq_password

[data_ingest_jq_initial]
; 历史导入：先从 2015-01-01 拉到今天，后面可以再改
start_date = 2015-01-01
end_date   = 2026-03-16

; 暂时先小范围测试，用几只票
universe = CUSTOM
stock_codes = 000001.SZ,600000.SH

; 一次 get_price 拉多少只股票，后面跑全 A 再调大
batch_size = 200

[mysql_source]
; 可选：外部 MySQL 源（当连得上时优先用它同步 DailyQuote/Calendar；连不上则自动回退到聚宽）
enabled = false

; MySQL 连接
host = localhost
port = 3306
user = your_mysql_user
password = your_mysql_password
db_name = your_mysql_db

; 源表名（与 LQTP-core/src/Data/JQsync.py 默认写入一致）
dailyquote_table = DailyQuote
calendar_table = Calendar

; TradeDate 格式假设
; - DailyQuote.TradeDate：date/datetime 或 YYYYMMDD 字符串
dailyquote_tradedate_format = date
; - Calendar.TradeDate：date 类型更常见（你给的 MySQL 结构也是 date）
calendar_tradedate_format = date

; 可选：当 universe 非 CUSTOM 时，这里默认不做 Symbol IN 过滤以避免映射差异
symbol_filter = false

; 性能：MySQL 同步 stock_daily 时按“日期段”分块拉取，避免一次性数据太大
stock_sync_chunk_days = 30

; 性能：Calendar 同步模式：
; - all：全表同步（只取 IsTradeDay=1），交给 upsert 去重
; - range：按当前任务区间同步（使用 trade_date +/- buffer）
calendar_sync_mode = all

